version: "3.9"

services:
  shieldkit:
    build: .
    container_name: shieldkit
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - SHIELDKIT_MODE=${SHIELDKIT_MODE:-mock}
      - DUCKDB_PATH=/app/data/shieldkit.duckdb
    volumes:
      - shieldkit-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For container scanning
    networks:
      - shieldkit-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  shieldkit-data:
    driver: local

networks:
  shieldkit-net:
    driver: bridge
    internal: false  # Needs outbound for cloud API calls and vuln DB updates
